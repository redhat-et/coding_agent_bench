---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app: qwen36-27b
    component: vllm
  name: qwen36-27b
  namespace: coding-agent-leaderboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app: qwen36-27b
    component: vllm
  name: qwen36-27b-anyuid
  namespace: coding-agent-leaderboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
- kind: ServiceAccount
  name: qwen36-27b
  namespace: coding-agent-leaderboard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    component: vllm
  name: qwen36-27b
  namespace: coding-agent-leaderboard
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  volumeMode: Filesystem
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: qwen36-27b
    component: vllm
  name: qwen36-27b
  namespace: coding-agent-leaderboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen36-27b
      component: vllm
  template:
    metadata:
      labels:
        app: qwen36-27b
        component: vllm
    spec:
      serviceAccountName: qwen36-27b
      nodeSelector:
        gpu-pool-size: xlarge
      securityContext:
        runAsUser: 2000
        runAsGroup: 0
        fsGroup: 0
      containers:
      - args:
        - |
          vllm serve RedHatAI/Qwen3.6-27B-FP8 \
            --served-model-name qwen3.6-27b \
            --async-scheduling \
            --dtype auto \
            --max-model-len 262144 \
            --trust-remote-code \
            --tensor-parallel-size 4 \
            --gpu-memory-utilization 0.9 \
            --enable-chunked-prefill \
            --enable-prefix-caching \
            --kv-cache-dtype fp8 \
            --enable-auto-tool-choice \
            --reasoning-parser qwen3 \
            --tool-call-parser qwen3_coder \
            --default-chat-template-kwargs '{"enable_thinking": true}'
        command:
        - /bin/sh
        - -c
        image: vllm/vllm-openai:v0.23.0
        imagePullPolicy: Always
        envFrom:
          - secretRef:
              name: hf-token-secret
        name: qwen36-27b
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "4"
            memory: 30G
            nvidia.com/gpu: "4"
          requests:
            cpu: "2"
            memory: 20G
            nvidia.com/gpu: "4"
        volumeMounts:
        - mountPath: /.cache
          name: cache-volume
        - mountPath: /.config
          name: config-volume
        - mountPath: /.triton
          name: triton-volume
        - mountPath: /.local
          name: local-volume
        - mountPath: /dev/shm
          name: shm
      volumes:
      - name: cache-volume
        persistentVolumeClaim:
          claimName: qwen36-27b
      - emptyDir:
          medium: Memory
          sizeLimit: 2Gi
        name: config-volume
      - emptyDir:
          medium: Memory
          sizeLimit: 2Gi
        name: local-volume
      - emptyDir:
          medium: Memory
          sizeLimit: 2Gi
        name: triton-volume
      - emptyDir:
          medium: Memory
          sizeLimit: 2Gi
        name: shm
---
apiVersion: v1
kind: Service
metadata:
  labels:
    component: vllm
  name: qwen36-27b
  namespace: coding-agent-leaderboard
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8000
  selector:
    app: qwen36-27b
    component: vllm
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  annotations:
    haproxy.router.openshift.io/timeout: 600s
  labels:
    app: qwen36-27b
    component: vllm
  name: qwen36-27b
  namespace: coding-agent-leaderboard
spec:
  port:
    targetPort: 8000
  to:
    kind: Service
    name: qwen36-27b
    weight: 100
  wildcardPolicy: None
