---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: job-queue-pvc
  labels:
    app: job-queue
spec:
  resources:
    requests:
      storage: 1Gi
  volumeMode: Filesystem
  storageClassName: gp3
  accessModes:
    - ReadWriteOnce
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-queue
  labels:
    name: job-queue
    app: job-queue
spec:
  selector:
    matchLabels:
      app: job-queue
      component: api
  template:
    metadata:
      labels:
        name: job-queue
        app: job-queue
        component: api
    spec:
      serviceAccountName: harbor-orchestrator
      securityContext:
        fsGroup: 1001
      containers:
      - image: ghcr.io/redhat-et/coding_agent_bench:latest
        name: job-queue
        command: ["/bin/sh", "-c"]
        args:
          - |
            uv run uvicorn coding_agent_bench.api:app --host 0.0.0.0 --port 8000
        resources:
          requests:
            cpu: "1"
            memory: "500M"
          limits:
            cpu: "1"
            memory: "1Gi"
        env:
        - name: JOB_STORE_PATH
          value: /app/data/jobs.db
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: job-queue-secret
              key: API_KEY
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9000
          name: brev-model
        imagePullPolicy: Always
        volumeMounts:
        - mountPath: /app/data
          name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: job-queue-pvc
      restartPolicy: Always
--- 
kind: Service
apiVersion: v1
metadata:
  name: job-queue-service
  labels:
    app: job-queue
    component: api
spec:
  selector:
    app: job-queue
    component: api
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
---
kind: Service
apiVersion: v1
metadata:
  name: brev-model-service
  labels:
    app: job-queue
    component: brev-model
spec:
  selector:
    app: job-queue
    component: api
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 9000
    protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: job-queue-route
  labels:
    app: job-queue
    component: api
spec:
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  port:
    targetPort: 8000
  to:
    kind: Service
    name: job-queue-service
    weight: 100
  wildcardPolicy: None